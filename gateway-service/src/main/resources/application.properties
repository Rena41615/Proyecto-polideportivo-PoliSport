spring.application.name=gateway-service
server.port=8080
spring.cloud.gateway.enabled=true

# URLs internas de cada microservicio. Por defecto apuntan a localhost:PUERTO,
# ya que en docker-compose los 11 servicios corren como procesos separados
# dentro del mismo contenedor "polisport-app" (ver start.sh), compartiendo
# la misma red de loopback. El perfil "render" sobrescribe estos valores
# con las URLs publicas de cada servicio desplegado en Render.
services.atletas.url=http://localhost:8081
services.biometria.url=http://localhost:8082
services.competencia.url=http://localhost:8083
services.contratos.url=http://localhost:8084
services.entrenamiento.url=http://localhost:8085
services.inventario.url=http://localhost:8086
services.salud.url=http://localhost:8087
services.iam.url=http://localhost:8088
services.nutricion.url=http://localhost:8089
services.staff.url=http://localhost:8090
