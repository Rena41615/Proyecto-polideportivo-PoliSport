spring.application.name=gateway-service
server.port=${SERVER_PORT:8080}
spring.cloud.gateway.enabled=true

# En Render cada microservicio se despliega como un web service independiente
# con su propia URL publica (HTTPS). Estas variables se resuelven en Render
# mediante "fromService" en render.yaml, que inyecta el host real de cada
# servicio (evita hardcodear URLs que pueden variar si el nombre ya esta
# tomado en Render).
services.atletas.url=https://${ATLETAS_SERVICE_HOST}
services.biometria.url=https://${BIOMETRIA_SERVICE_HOST}
services.competencia.url=https://${COMPETENCIA_SERVICE_HOST}
services.contratos.url=https://${CONTRATOS_SERVICE_HOST}
services.entrenamiento.url=https://${ENTRENAMIENTO_SERVICE_HOST}
services.inventario.url=https://${INVENTARIO_SERVICE_HOST}
services.salud.url=https://${SALUD_SERVICE_HOST}
services.iam.url=https://${IAM_SERVICE_HOST}
services.nutricion.url=https://${NUTRICION_SERVICE_HOST}
services.staff.url=https://${STAFF_SERVICE_HOST}
