services:
  - type: web
    name: polisport-gateway
    env: java
    region: oregon
    buildCommand: ./mvnw -B -DskipTests clean package
    startCommand: java -jar gateway-service/target/*.jar --server.port=8080
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render

  - type: web
    name: polisport-atletas
    env: java
    region: oregon
    buildCommand: ./mvnw -B -DskipTests clean package
    startCommand: java -jar atletas-service/target/*.jar --server.port=8081
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SERVER_PORT
        value: 8081

