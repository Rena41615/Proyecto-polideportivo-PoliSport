services:
  - type: web
    name: polisport-gateway
    env: docker
    region: oregon
    dockerfilePath: ./gateway-service/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SERVER_PORT
        value: 8080
      # Host publico real de cada microservicio, resuelto por Render en
      # tiempo de deploy (evita hardcodear una URL que puede variar si el
      # nombre del servicio ya esta tomado en Render).
      - key: ATLETAS_SERVICE_HOST
        fromService:
          name: polisport-atletas
          type: web
          property: host
      - key: BIOMETRIA_SERVICE_HOST
        fromService:
          name: polisport-biometria
          type: web
          property: host
      - key: COMPETENCIA_SERVICE_HOST
        fromService:
          name: polisport-competencia
          type: web
          property: host
      - key: CONTRATOS_SERVICE_HOST
        fromService:
          name: polisport-contratos
          type: web
          property: host
      - key: ENTRENAMIENTO_SERVICE_HOST
        fromService:
          name: polisport-entrenamiento
          type: web
          property: host
      - key: INVENTARIO_SERVICE_HOST
        fromService:
          name: polisport-inventario
          type: web
          property: host
      - key: SALUD_SERVICE_HOST
        fromService:
          name: polisport-salud
          type: web
          property: host
      - key: IAM_SERVICE_HOST
        fromService:
          name: polisport-iam
          type: web
          property: host
      - key: NUTRICION_SERVICE_HOST
        fromService:
          name: polisport-nutricion
          type: web
          property: host
      - key: STAFF_SERVICE_HOST
        fromService:
          name: polisport-staff
          type: web
          property: host

  - type: web
    name: polisport-atletas
    env: docker
    region: oregon
    dockerfilePath: ./atletas-service/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SERVER_PORT
        value: 8081

  - type: web
    name: polisport-biometria
    env: docker
    region: oregon
    dockerfilePath: ./biometria-service/Dockerfile
    envVars:
