spring.application.name=competencia-service
server.port=8083

# Conexion directa al contenedor db-competencias mapeado en el docker-compose
spring.datasource.url=jdbc:mysql://db-competencias:3306/polisport_competencias_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.show-sql=false

spring.docker.compose.enabled=false
spring.jpa.open-in-view=true

spring.main.web-application-type=servlet

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true