# Puerto diferente al de inventario
spring.application.name=biometria-service
server.port=8082

# Base de datos propia para BiometrÝa
spring.datasource.url=jdbc:mysql://localhost:3306/db_polisport_biometria?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciˇn de Flyway y JPA
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=true

# FUERA DOCKEEEER
spring.docker.compose.enabled=false
spring.jpa.open-in-view=false