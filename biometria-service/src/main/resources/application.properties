spring.application.name=biometria-service
server.port=8082

# Conexion al contenedor db-biometria (agregado en el paso anterior)
spring.datasource.url=jdbc:mysql://db-biometria:3306/db_polisport_biometria?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.docker.compose.enabled=false
spring.jpa.open-in-view=false

spring.main.web-application-type=servlet

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true