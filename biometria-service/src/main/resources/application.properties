# Puerto diferente al de inventario
server.port=8082

# Base de datos propia para Biometría
spring.datasource.url=jdbc:mysql://localhost:3306/polisport_biometria?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Flyway y JPA
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Evitar problemas con Docker
spring.docker.compose.enabled=false