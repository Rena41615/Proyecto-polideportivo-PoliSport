spring.application.name=biometria-service
server.port=8082

spring.datasource.url=${DB_BIOMETRIA_URL:jdbc:mysql://localhost:3306/db_polisport_biometria?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_BIOMETRIA_USER:root}
spring.datasource.password=${DB_BIOMETRIA_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.docker.compose.enabled=false