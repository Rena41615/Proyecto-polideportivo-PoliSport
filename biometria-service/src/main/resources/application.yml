spring:
  application:
    name: biometria-service
  datasource:
    url: jdbc:mysql://db-biometria:3306/db_polisport_biometria?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  docker:
    compose:
      enabled: false
  main:
    web-application-type: servlet

server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /api-docs
