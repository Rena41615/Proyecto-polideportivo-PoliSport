services:
  mysql:
    image: 'mysql:8.0'
    container_name: iam-mysql
    environment:
      MYSQL_DATABASE: db_polisport_iam
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3309:3306'
    volumes:
      - iam-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  iam-service:
    build:
      context: ..
      dockerfile: iam-service/Dockerfile
    container_name: iam-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/db_polisport_iam?createDatabaseIfNotExist=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - '8086:8086'

volumes:
  iam-mysql-data:
