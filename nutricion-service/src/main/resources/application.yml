spring:
  application:
    name: nutricion-service
  datasource:
    url: jdbc:mysql://db-nutricion:3306/polisport_nutricion_db?useSSL=false&serverTimezone=UTC
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
  docker:
    compose:
      enabled: false
  main:
    web-application-type: servlet

server:
  port: 8089

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /api-docs
