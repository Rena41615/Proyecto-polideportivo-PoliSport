services:
  mysql:
    image: 'mysql:8.0'
    container_name: nutricion-mysql
    environment:
      MYSQL_DATABASE: db_polisport_nutricion
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3308:3306'
    volumes:
      - nutricion-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  nutricion-service:
    build:
      context: ..
      dockerfile: nutricion-service/Dockerfile
    container_name: nutricion-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/db_polisport_nutricion?createDatabaseIfNotExist=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - '8088:8088'

volumes:
  nutricion-mysql-data:
