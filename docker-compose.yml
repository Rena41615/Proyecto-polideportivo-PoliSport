services:
  # ==========================================
  # BASES DE DATOS (Independientes por servicio)
  # ==========================================

  db-atletas:
    image: mysql:8.0
    container_name: polisport-atletas-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_atletas_db
    ports:
      - "3309:3306"
    volumes:
      - atletas_data:/var/lib/mysql
    networks:
      - net-atletas
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-biometria:
    image: mysql:8.0
    container_name: polisport-biometria-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: db_polisport_biometria
    ports:
      - "3310:3306"
    volumes:
      - biometria_data:/var/lib/mysql
    networks:
      - net-biometria
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-competencias:
    image: mysql:8.0
    container_name: polisport-competencias-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_competencias_db
    ports:
      - "3311:3306"
    volumes:
      - competencias_data:/var/lib/mysql
    networks:
      - net-competencias
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-contratos:
    image: mysql:8.0
    container_name: polisport-contratos-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_contratos_db
    ports:
      - "3312:3306"
    volumes:
      - contratos_data:/var/lib/mysql
    networks:
      - net-contratos
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-entrenamientos:
    image: mysql:8.0
    container_name: polisport-entrenamientos-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_entrenamientos_db
    ports:
      - "3313:3306"
    volumes:
      - entrenamientos_data:/var/lib/mysql
    networks:
      - net-entrenamientos
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-inventario:
    image: mysql:8.0
    container_name: polisport-inventario-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_inventario_db
    ports:
      - "3314:3306"
    volumes:
      - inventario_data:/var/lib/mysql
    networks:
      - net-inventario
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-salud:
    image: mysql:8.0
    container_name: polisport-salud-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_salud_db
    ports:
      - "3315:3306"
    volumes:
      - salud_data:/var/lib/mysql
    networks:
      - net-salud
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-iam:
    image: mysql:8.0
    container_name: polisport-iam-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_iam_db
    ports:
      - "3316:3306"
    volumes:
      - iam_data:/var/lib/mysql
    networks:
      - net-iam
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-nutricion:
    image: mysql:8.0
    container_name: polisport-nutricion-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_nutricion_db
    ports:
      - "3317:3306"
    volumes:
      - nutricion_data:/var/lib/mysql
    networks:
      - net-nutricion
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-staff:
    image: mysql:8.0
    container_name: polisport-staff-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_staff_db
    ports:
      - "3318:3306"
    volumes:
      - staff_data:/var/lib/mysql
    networks:
      - net-staff
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5


  # ==========================================
  # MICROSERVICIOS (Cada uno en su propio contenedor)
  # ==========================================

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: polisport-gateway
    restart: on-failure
    ports:
      - "8080:8080"
    networks:
      - polisport-network

  atletas-service:
    build:
      context: .
      dockerfile: atletas-service/Dockerfile
    container_name: polisport-atletas
    restart: on-failure
    ports:
      - "8081:8081"
    depends_on:
      db-atletas:
        condition: service_healthy
    networks:
      - net-atletas
      - polisport-network

  biometria-service:
    build:
      context: .
      dockerfile: biometria-service/Dockerfile
    container_name: polisport-biometria
    restart: on-failure
    ports:
      - "8082:8082"
    depends_on:
      db-biometria:
        condition: service_healthy
    networks:
      - net-biometria
      - polisport-network

  competencia-service:
    build:
      context: .
      dockerfile: competencia-service/Dockerfile
    container_name: polisport-competencias
    restart: on-failure
    ports:
      - "8083:8083"
    depends_on:
      db-competencias:
        condition: service_healthy
    networks:
      - net-competencias
      - polisport-network

  contratos-service:
    build:
      context: .
      dockerfile: contratos-service/Dockerfile
    container_name: polisport-contratos
    restart: on-failure
    ports:
      - "8084:8084"
    depends_on:
      db-contratos:
        condition: service_healthy
    networks:
      - net-contratos
      - polisport-network

  entrenamiento-service:
    build:
      context: .
      dockerfile: entrenamiento-service/Dockerfile
    container_name: polisport-entrenamientos
    restart: on-failure
    ports:
      - "8085:8085"
    depends_on:
      db-entrenamientos:
        condition: service_healthy
    networks:
      - net-entrenamientos
      - polisport-network

  inventario-service:
    build:
      context: .
      dockerfile: inventario-service/Dockerfile
    container_name: polisport-inventario
    restart: on-failure
    ports:
      - "8086:8086"
    depends_on:
      db-inventario:
        condition: service_healthy
    networks:
      - net-inventario
      - polisport-network

  salud-service:
    build:
      context: .
      dockerfile: salud-service/Dockerfile
    container_name: polisport-salud
    restart: on-failure
    ports:
      - "8087:8087"
    depends_on:
      db-salud:
        condition: service_healthy
    networks:
      - net-salud
      - polisport-network

  iam-service:
    build:
      context: .
      dockerfile: iam-service/Dockerfile
    container_name: polisport-iam
    restart: on-failure
    ports:
      - "8088:8088"
    depends_on:
      db-iam:
        condition: service_healthy
    networks:
      - net-iam
      - polisport-network

  nutricion-service:
    build:
      context: .
      dockerfile: nutricion-service/Dockerfile
    container_name: polisport-nutricion
    restart: on-failure
    ports:
      - "8089:8089"
    depends_on:
      db-nutricion:
        condition: service_healthy
    networks:
      - net-nutricion
      - polisport-network

  staff-service:
    build:
      context: .
      dockerfile: staff-service/Dockerfile
    container_name: polisport-staff
    restart: on-failure
    ports:
      - "8090:8090"
    depends_on:
      db-staff:
        condition: service_healthy
    networks:
      - net-staff
      - polisport-network

networks:
  polisport-network:
    driver: bridge
  net-atletas:
  net-biometria:
  net-competencias:
  net-contratos:
  net-entrenamientos:
  net-inventario:
  net-salud:
  net-iam:
  net-nutricion:
  net-staff:

volumes:
  atletas_data:
  biometria_data:
  competencias_data:
  contratos_data:
  entrenamientos_data:
  inventario_data:
  salud_data:
  iam_data:
  nutricion_data:
  staff_data:
