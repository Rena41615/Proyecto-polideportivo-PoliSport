services:
  # ==========================================
  # CAPA DE BASES DE DATOS INDEPENDIENTES (Sin contrasena)
  # ==========================================

  db-atletas:
    image: mysql:8.0
    container_name: polisport-atletas-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_atletas_db
    ports:
      - "3309:3306"
    volumes:
      - atletas_data:/var/lib/mysql
    networks:
      - net-atletas
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-biometria:
    image: mysql:8.0
    container_name: polisport-biometria-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: db_polisport_biometria
    ports:
      - "3310:3306"
    volumes:
      - biometria_data:/var/lib/mysql
    networks:
      - net-biometria
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-competencias:
