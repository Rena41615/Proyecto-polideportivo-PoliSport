  db-nutricion:
    image: mysql:8.0
    container_name: polisport-nutricion-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_nutricion_db
    ports:
      - "3317:3306"
    volumes:
      - nutricion_data:/var/lib/mysql
    networks:
      - net-nutricion
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-staff:
    image: mysql:8.0
    container_name: polisport-staff-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_staff_db
    ports:
      - "3318:3306"
    volumes:
      - staff_data:/var/lib/mysql
    networks:
      - net-staff
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5


  # ==========================================
  # CAPA DE MICROSERVICIOS
  # ==========================================

  atletas-service:
    build:
      context: .
      dockerfile: atletas-service/Dockerfile
    container_name: atletas-service
    restart: on-failure
    mem_limit: 512m
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "8081:8080"
    depends_on:
      db-atletas:
        condition: service_healthy
    networks:
      - net-atletas
      - polisport-network

  biometria-service:
