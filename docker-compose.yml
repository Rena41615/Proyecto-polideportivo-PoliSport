# ==========================================
# DEFINICIÓN DE REDES Y VOLÚMENES AISLADOS
# ==========================================
networks:
  polisport-network:
    driver: bridge
  net-atletas:
  net-biometria:
  net-competencias:
  net-contratos:
  net-entrenamientos:
  net-inventario:
  net-salud:
  net-iam:
  net-nutricion:
  net-staff:

volumes:
  atletas_data:
  biometria_data:
  competencias_data:
  contratos_data:
  entrenamientos_data:
  inventario_data:
  salud_data:
  iam_data:
  nutricion_data:
  staff_data: