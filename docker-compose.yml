  db-iam:
    image: mysql:8.0
    container_name: polisport-iam-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_iam_db
    ports:
      - "3316:3306"
    volumes:
      - iam_data:/var/lib/mysql
