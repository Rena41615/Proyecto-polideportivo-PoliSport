    ports:
      - "3314:3306"
    volumes:
      - inventario_data:/var/lib/mysql
    networks:
      - net-inventario
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-salud:
    image: mysql:8.0
    container_name: polisport-salud-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_salud_db
    ports:
      - "3315:3306"
    volumes:
      - salud_data:/var/lib/mysql
    networks:
      - net-salud
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
