services:
  # ==========================================
  # CAPA DE BASES DE DATOS INDEPENDIENTES (Sin contrasena)
  # ==========================================

  db-atletas:
    image: mysql:8.0
    container_name: polisport-atletas-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_atletas_db
    ports:
      - "3309:3306"
    volumes:
      - atletas_data:/var/lib/mysql
    networks:
      - net-atletas
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-biometria:
    image: mysql:8.0
    container_name: polisport-biometria-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: db_polisport_biometria
    ports:
      - "3310:3306"
    volumes:
      - biometria_data:/var/lib/mysql
    networks:
      - net-biometria
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-competencias:
    image: mysql:8.0
    container_name: polisport-competencias-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_competencias_db
    ports:
      - "3311:3306"
    volumes:
      - competencias_data:/var/lib/mysql
    networks:
      - net-competencias
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-contratos:
    image: mysql:8.0
    container_name: polisport-contratos-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_contratos_db
    ports:
      - "3312:3306"
    volumes:
      - contratos_data:/var/lib/mysql
    networks:
      - net-contratos
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-entrenamientos:
    image: mysql:8.0
    container_name: polisport-entrenamientos-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_entrenamientos_db
    ports:
      - "3313:3306"
    volumes:
      - entrenamientos_data:/var/lib/mysql
    networks:
      - net-entrenamientos
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-inventario:
    image: mysql:8.0
    container_name: polisport-inventario-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_inventario_db
    ports:
      - "3314:3306"
    volumes:
      - inventario_data:/var/lib/mysql
    networks:
      - net-inventario
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-salud:
    image: mysql:8.0
    container_name: polisport-salud-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_salud_db
    ports:
      - "3315:3306"
    volumes:
      - salud_data:/var/lib/mysql
    networks:
      - net-salud
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-iam:
    image: mysql:8.0
    container_name: polisport-iam-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_iam_db
    ports:
      - "3316:3306"
    volumes:
      - iam_data:/var/lib/mysql
    networks:
      - net-iam
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-nutricion:
    image: mysql:8.0
    container_name: polisport-nutricion-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_nutricion_db
    ports:
      - "3317:3306"
    volumes:
      - nutricion_data:/var/lib/mysql
    networks:
      - net-nutricion
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-staff:
    image: mysql:8.0
    container_name: polisport-staff-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: polisport_staff_db
    ports:
      - "3318:3306"
    volumes:
      - staff_data:/var/lib/mysql
    networks:
      - net-staff
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5


  # ==========================================
  # CONTENEDOR ÚNICO CON LOS 10 MICROSERVICIOS
  # ==========================================

  polisport-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polisport-app
    restart: on-failure
    mem_limit: 2g
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1g
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
      - "8085:8085"
      - "8086:8086"
      - "8087:8087"
      - "8088:8088"
      - "8089:8089"
      - "8090:8090"
    depends_on:
      db-atletas:
        condition: service_healthy
      db-biometria:
        condition: service_healthy
      db-competencias:
        condition: service_healthy
      db-contratos:
        condition: service_healthy
      db-entrenamientos:
        condition: service_healthy
      db-inventario:
        condition: service_healthy
      db-salud:
        condition: service_healthy
      db-iam:
        condition: service_healthy
      db-nutricion:
        condition: service_healthy
      db-staff:
        condition: service_healthy
    networks:
      - net-atletas
      - net-biometria
      - net-competencias
      - net-contratos
      - net-entrenamientos
      - net-inventario
      - net-salud
      - net-iam
      - net-nutricion
      - net-staff
      - polisport-network

# ==========================================
# DEFINICIÓN DE REDES Y VOLÚMENES AISLADOS
# ==========================================
networks:
  polisport-network:
    driver: bridge
  net-atletas:
  net-biometria:
  net-competencias:
  net-contratos:
  net-entrenamientos:
  net-inventario:
  net-salud:
  net-iam:
  net-nutricion:
  net-staff:

volumes:
  atletas_data:
  biometria_data:
  competencias_data:
  contratos_data:
  entrenamientos_data:
  inventario_data:
  salud_data:
  iam_data:
  nutricion_data:
  staff_data: