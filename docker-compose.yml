    ports:
      - "3313:3306"
    volumes:
      - entrenamientos_data:/var/lib/mysql
    networks:
      - net-entrenamientos
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  db-inventario:
