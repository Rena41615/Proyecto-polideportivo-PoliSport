spring.application.name=salud-service
server.port=8089

spring.datasource.url=${DB_SALUD_URL:jdbc:mysql://localhost:3306/db_polisport_salud?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_SALUD_USER:root}
spring.datasource.password=${DB_SALUD_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.docker.compose.enabled=false