spring.application.name=inventario-service
server.port=8087

spring.datasource.url=${DB_INVENTARIO_URL:jdbc:mysql://localhost:3306/db_polisport_inventario?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_INVENTARIO_USER:root}
spring.datasource.password=${DB_INVENTARIO_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.docker.compose.enabled=false