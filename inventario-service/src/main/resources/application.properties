spring.application.name=inventario-service
server.port=8086

# Conexion al contenedor db-inventario dentro de Docker
spring.datasource.url=jdbc:mysql://db-inventario:3306/polisport_inventario_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.show-sql=false

spring.docker.compose.enabled=false
spring.jpa.open-in-view=false

spring.main.web-application-type=servlet

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true