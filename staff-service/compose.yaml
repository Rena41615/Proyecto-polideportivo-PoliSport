services:
  mysql:
    image: 'mysql:8.0'
    container_name: staff-mysql
    environment:
      MYSQL_DATABASE: db_polisport_staff
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3310:3306'
    volumes:
      - staff-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  staff-service:
    build:
      context: ..
      dockerfile: staff-service/Dockerfile
    container_name: staff-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/db_polisport_staff?createDatabaseIfNotExist=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - '8090:8090'

volumes:
  staff-mysql-data:
